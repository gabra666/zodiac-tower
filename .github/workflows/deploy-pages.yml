name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ZodiacTower.sln

      - name: Publish Blazor WebAssembly
        run: dotnet publish ZodiacTower.Web/ZodiacTower.Web.csproj --configuration Release --no-restore

      - name: Prepare GitHub Pages files
        env:
          PUBLISH_DIR: ZodiacTower.Web/bin/Release/net9.0/publish/wwwroot
        run: |
          BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}\" />|" "$PUBLISH_DIR/index.html"
          cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
          touch "$PUBLISH_DIR/.nojekyll"
          grep -F "<base href=\"${BASE_PATH}\" />" "$PUBLISH_DIR/index.html"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ZodiacTower.Web/bin/Release/net9.0/publish/wwwroot
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
